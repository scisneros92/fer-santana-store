<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Login</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    height:100vh;

    display:flex;
    justify-content:center;
    align-items:center;

    background:
    linear-gradient(
        135deg,
        #ffe6ef,
        #f8f8f8,
        #f3d7e3
    );

    overflow:hidden;
}

/* EFECTOS FONDO */

body::before,
body::after{
    content:'';
    position:absolute;
    border-radius:50%;
    filter:blur(80px);
    z-index:0;
}

body::before{
    width:300px;
    height:300px;
    background:#ff8fb1;
    top:-100px;
    left:-100px;
    opacity:.4;
}

body::after{
    width:350px;
    height:350px;
    background:#d8d8d8;
    bottom:-120px;
    right:-120px;
    opacity:.5;
}

/* LOGIN */

.login-box{
    position:relative;
    z-index:2;

    width:380px;

    background:rgba(255,255,255,.75);

    backdrop-filter:blur(18px);

    padding:45px;

    border-radius:30px;

    border:1px solid rgba(255,255,255,.5);

    box-shadow:
    0 20px 50px rgba(0,0,0,.12);

    animation:fade .8s ease;
}

@keyframes fade{
    from{
        opacity:0;
        transform:translateY(40px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

.logo{
    text-align:center;
    margin-bottom:25px;
}

.logo img{
    width:80px;
    margin-bottom:15px;
}

.logo h2{
    color:#ff4f81;
    font-weight:700;
    margin-bottom:5px;
}

.logo p{
    color:#777;
    font-size:14px;
}

/* INPUTS */

.form-control{
    height:55px;

    border:none;

    border-radius:15px;

    background:#f8f8f8;

    padding-left:18px;

    margin-bottom:18px;

    transition:.3s;
}

.form-control:focus{
    box-shadow:
    0 0 0 4px rgba(255,79,129,.15);

    background:white;
}

/* BOTON */

.btn-login{
    width:100%;
    height:55px;

    border:none;

    border-radius:15px;

    background:
    linear-gradient(
        90deg,
        #ff7eb3,
        #ff4f81
    );

    color:white;

    font-size:17px;
    font-weight:600;

    transition:.3s;
}

.btn-login:hover{
    transform:translateY(-3px);

    box-shadow:
    0 12px 25px rgba(255,79,129,.35);
}

/* TEXTO EXTRA */

.extra{
    text-align:center;
    margin-top:20px;
    color:#999;
    font-size:14px;
}

</style>

</head>
<body>

<div class="login-box">

    <div class="logo">

        <h2>Fernanda Santana</h2>

        <p>Panel de Administración</p>

    </div>

    <input
        type="email"
        id="email"
        class="form-control"
        placeholder="Correo electrónico">

    <input
        type="password"
        id="password"
        class="form-control"
        placeholder="Contraseña">

    <button
        class="btn-login"
        onclick="login()">

        Ingresar

    </button>

    <div class="extra">
        Moda • Beauty • Fitness
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>

const supabaseUrl = 'https://rptnbxyerjcwzxflijpm.supabase.co';

const supabaseKey = 'sb_publishable_6ik7MsO_dx2Jua_lZH5lPg_yl3r4pt_';

const supabaseClient = window.supabase.createClient(
    supabaseUrl,
    supabaseKey
);

async function login(){

    const email = document.getElementById('email').value;

    const password = document.getElementById('password').value;

    const { error } = await supabaseClient.auth.signInWithPassword({
        email,
        password
    });

    if(error){

        alert("Credenciales incorrectas");

        return;
    }

    window.location.href = "admin.html";
}

</script>

</body>
</html>
